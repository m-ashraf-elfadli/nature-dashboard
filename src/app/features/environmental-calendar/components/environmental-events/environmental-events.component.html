<div class="page-content">
  <app-page-header [showBackButton]="false"></app-page-header>
  <h1>{{ 'environmental_calendar.page_title' | translate }}</h1>
  <app-reusable-table
    [data]="data"
    [config]="config"
    [actions]="actions"
    [totalRecords]="totalRecords"
    [filterItems]="filterItems"
    [emptyStateInfo]="emptyStateInfo"
    (paginationChange)="onPaginationChange($event)"
    (selectionChange)="selectionChange($event)"
    (onServerSideFilterChange)="onFilterChange($event)"
  />
</div>

<p-dialog
  styleClass="form-dialog"
  [modal]="true"
  dismissableMask="true"
  [(visible)]="visible"
  [style]="{ width: '40rem' }"
  (onHide)="onDialogHide()"
>
  <ng-template pTemplate="header">
    @if (currentEventId) {
      <h2>{{ 'environmental_calendar.form.edit_title' | translate }}</h2>
    } @else {
      <h2>{{ 'environmental_calendar.form.title' | translate }}</h2>
    }
  </ng-template>

  <app-event-form
    [eventId]="currentEventId"
    (formClose)="handleFormClose($event)"
  />
</p-dialog>
